<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MiddAR monitor</title>
<style>
  :root {
    --bg:#0f1115; --panel:#161a21; --panel2:#1b212b; --line:#262d39;
    --fg:#d8dee9; --dim:#8b97a8; --accent:#6aa9ff; --good:#5fd08a;
    --warn:#e8c468; --bad:#e8736a; --tool:#b48ead;
  }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;
         background:var(--bg); color:var(--fg); height:100vh; display:flex; flex-direction:column; }
  header { padding:10px 16px; border-bottom:1px solid var(--line); display:flex;
           align-items:center; gap:12px; }
  header h1 { font-size:15px; margin:0; font-weight:600; letter-spacing:.5px; }
  header .meta { color:var(--dim); font-size:12px; }
  .layout { flex:1; display:flex; min-height:0; }
  /* left: experiment list */
  #list { width:340px; border-right:1px solid var(--line); overflow:auto; }
  .exp { padding:10px 14px; border-bottom:1px solid var(--line); cursor:pointer; }
  .exp:hover { background:var(--panel); }
  .exp.sel { background:var(--panel2); border-left:3px solid var(--accent); padding-left:11px; }
  .exp .row1 { display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .exp .name { font-weight:600; }
  .exp .fw { color:var(--tool); font-size:12px; }
  .exp .status { font-size:12px; color:var(--dim); margin-top:2px; }
  .exp .idea { font-size:11px; color:var(--dim); margin-top:4px; overflow:hidden;
               text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
  .running { background:var(--good); box-shadow:0 0 6px var(--good); animation:pulse 1.4s infinite; }
  .idle { background:var(--dim); }
  .no-session { background:#3a4250; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  /* right: detail + stream */
  #detail { flex:1; display:flex; flex-direction:column; min-width:0; }
  #dhead { padding:10px 16px; border-bottom:1px solid var(--line); }
  #dhead h2 { margin:0 0 4px; font-size:15px; }
  #dhead .sub { color:var(--dim); font-size:12px; }
  #gates { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .gate { font-size:11px; padding:2px 7px; border-radius:10px; border:1px solid var(--line); }
  .PASS { color:var(--good); border-color:var(--good); }
  .FAIL,.ERROR { color:var(--bad); border-color:var(--bad); }
  .tabs { display:flex; gap:4px; padding:8px 16px 0; }
  .tab { font-size:12px; padding:5px 12px; border:1px solid var(--line); border-bottom:none;
         border-radius:6px 6px 0 0; cursor:pointer; color:var(--dim); }
  .tab.act { color:var(--fg); background:var(--panel); }
  #panes { flex:1; overflow:auto; padding:12px 16px; background:var(--panel); }
  .ev { padding:6px 10px; border-radius:6px; margin-bottom:6px; white-space:pre-wrap;
        word-break:break-word; border:1px solid transparent; }
  .ev .lbl { font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--dim); margin-bottom:2px; }
  .ev.text { background:var(--panel2); }
  .ev.tool { background:#231e2b; border-color:var(--tool); }
  .ev.tool .tname { color:var(--tool); font-weight:600; }
  .ev.result { background:#13181f; color:var(--dim); font-size:12px; }
  .ev.user { background:#16212b; }
  .ev.system { color:var(--warn); font-size:12px; }
  .hidden { display:none; }
  pre.md { white-space:pre-wrap; word-break:break-word; margin:0; color:var(--fg); }
  .led { padding:6px 0; border-bottom:1px solid var(--line); }
  .led .tag { font-size:10px; padding:1px 6px; border-radius:8px; border:1px solid var(--line); color:var(--dim); }
  .empty { color:var(--dim); padding:24px; text-align:center; }
</style>
</head>
<body>
<header>
  <h1>MiddAR<span style="color:var(--accent)">·</span>monitor</h1>
  <span class="meta" id="hmeta">read-only · polling every 4s</span>
</header>
<div class="layout">
  <div id="list"><div class="empty">loading…</div></div>
  <div id="detail"><div class="empty">select an experiment</div></div>
</div>

<script>
const $ = (s,r=document)=>r.querySelector(s);
let selected=null, es=null, tab='stream';

async function loadList(){
  let data;
  try { data = await (await fetch('/api/experiments')).json(); }
  catch(e){ return; }
  const list=$('#list'); list.innerHTML='';
  if(!data.length){ list.innerHTML='<div class="empty">no experiments</div>'; return; }
  for(const e of data){
    const div=document.createElement('div');
    div.className='exp'+(e.name===selected?' sel':'');
    div.onclick=()=>select(e.name);
    div.innerHTML=`<div class="row1">
        <span class="name"><span class="dot ${e.activity}"></span>${e.name}</span>
        <span class="fw">${e.framework}</span></div>
      <div class="status">${e.status}${e.has_paper?' · 📄 paper':''}</div>
      <div class="idea">${escapeHtml(e.idea||'')}</div>`;
    list.appendChild(div);
  }
}

async function select(name){
  selected=name;
  document.querySelectorAll('.exp').forEach(d=>d.classList.toggle('sel',
    d.querySelector('.name').textContent.trim()===name));
  const d=await (await fetch('/api/experiment/'+encodeURIComponent(name))).json();
  renderDetail(d);
  openStream(name);
}

function renderDetail(d){
  const det=$('#detail');
  const gates=(d.gates||[]).map(g=>`<span class="gate ${g.status}">${g.gate}: ${g.status}</span>`).join('')
              || '<span class="gate">no gate report yet</span>';
  det.innerHTML=`
    <div id="dhead">
      <h2><span class="dot ${d.activity}"></span>${d.name}
          <span class="sub">${d.framework} · ${d.data_mode||''} · ${d.status}</span></h2>
      <div class="sub">session: ${d.session_id||'—'} · last activity: ${d.last_activity||'—'}</div>
      <div id="gates">${gates}</div>
    </div>
    <div class="tabs">
      <div class="tab ${tab==='stream'?'act':''}" data-t="stream">live stream</div>
      <div class="tab ${tab==='exp'?'act':''}" data-t="exp">EXPERIMENT.md</div>
      <div class="tab ${tab==='ledger'?'act':''}" data-t="ledger">ledger (${(d.ledger||[]).length})</div>
    </div>
    <div id="panes"></div>`;
  det.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{tab=t.dataset.t; renderPane(d);});
  renderPane(d);
}

function renderPane(d){
  const p=$('#panes'); if(!p) return;
  if(tab==='stream'){ p.innerHTML='<div id="stream"></div>'; replayBuffer(); }
  else if(tab==='exp'){ p.innerHTML=`<pre class="md">${escapeHtml(d.experiment_md||'(none)')}</pre>`; }
  else if(tab==='ledger'){
    p.innerHTML=(d.ledger||[]).map(l=>`<div class="led">
        <span class="tag">${l.tag||'?'}</span> <b>${l.id||''}</b>
        <div class="sub" style="color:var(--dim);font-size:12px">${escapeHtml(l.path||'')}</div>
        <div>${escapeHtml(l.artifact||'')}</div></div>`).join('')
      || '<div class="empty">no ledger entries</div>';
  }
}

let buffer=[];
function openStream(name){
  if(es) es.close();
  buffer=[];
  es=new EventSource('/api/stream/'+encodeURIComponent(name));
  es.onmessage=ev=>{
    let o; try{o=JSON.parse(ev.data);}catch(e){return;}
    buffer.push(o); if(buffer.length>1000) buffer.shift();
    if(tab==='stream') appendEvent(o);
  };
  es.onerror=()=>{/* EventSource auto-reconnects */};
}
function replayBuffer(){
  const s=$('#stream'); if(!s) return; s.innerHTML='';
  buffer.forEach(appendEvent);
}
function appendEvent(o){
  const s=$('#stream'); if(!s) return;
  const near = s.parentElement.scrollHeight - s.parentElement.scrollTop - s.parentElement.clientHeight < 80;
  const div=document.createElement('div');
  if(o.kind==='tool'){
    div.className='ev tool';
    div.innerHTML=`<div class="lbl">tool</div><span class="tname">${o.tool}</span> ${escapeHtml(o.summary||'')}`;
  } else if(o.kind==='text'){
    div.className='ev text';
    div.innerHTML=`<div class="lbl">assistant</div>${escapeHtml(o.text||'')}`;
  } else if(o.kind==='result'){
    div.className='ev result';
    div.innerHTML=`<div class="lbl">result</div>${escapeHtml(o.text||'')}`;
  } else if(o.kind==='user'){
    div.className='ev user';
    div.innerHTML=`<div class="lbl">user</div>${escapeHtml(o.text||'')}`;
  } else {
    div.className='ev system';
    div.textContent='⚙ '+(o.text||'');
  }
  s.appendChild(div);
  if(near) s.parentElement.scrollTop=s.parentElement.scrollHeight;
}

function escapeHtml(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

loadList();
setInterval(loadList,4000);
</script>
</body>
</html>
